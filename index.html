<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Part Properties Detector</title>
</head>
<body>

      
    <div class="container1">
        
        <div class="Titel">
            <img src="Logo.svg" id="logo" alt="Logo" >
            <h1>Part Properties Detector</h1>
        </div>
        <div class="text">
          <p>A powerful tool to analyze and identify the properties of any car part with precision </p>
          <p>Powered by <Pr>Google Gemini</Pr></p>
        </div>
    <div>
           


         <div class="container2">
                <div class="result">
                  <h4 id="Name">Name: ?</h4>
                  <h4 id="Category">Category: ?</h4>
                  <h4 id="State">State: ?</h4>   
                </div>
                <h5 id="error-text">Image analysis failed</h5>
         
          
             <div class="icon-container">
                 <img alt="icon " id="icon">
                 
             </div>
                
           
            
             <input type="file" id="image"accept="image/*">
             <label for="image">Upload your image</label>
           </div>


         </div>
        
            
    
    <script src="script.js"></script>




</body>
</html>
